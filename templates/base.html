<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hirely</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Hirely</a>

            <div>
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a href="{% url 'job_list' %}" class="btn btn-outline-light btn-sm">Jobs</a>

                {% if user.role == 'CANDIDATE' %}
                    <a href="{% url 'profile' %}" class="btn btn-outline-light btn-sm">My Profile</a>
                    <a href="{% url 'my_applications' %}" class="btn btn-outline-light btn-sm">My Applications</a>
                {% endif %}

                {% if user.role == 'RECRUITER' %}
                    <a href="{% url 'create_job' %}" class="btn btn-outline-light btn-sm">Post Job</a>
                {% endif %}

                <a href="{% url 'logout' %}" class="btn btn-warning btn-sm">Logout</a>
            {% else %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
