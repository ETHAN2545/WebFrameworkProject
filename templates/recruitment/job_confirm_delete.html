{% extends 'base.html' %}

{% block content %}
<h2>Delete Job</h2>
<p>Are you sure you want to delete "{{ job.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'job_detail' job.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
